<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Electron Orbit Quest</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top, #263e88, transparent 40%),
        linear-gradient(135deg, #070b24, #15134d);
    }

    .game-card {
      width: 100%;
      max-width: 620px;
      padding: 35px 28px;
      border: 1px solid rgba(94, 234, 255, 0.5);
      border-radius: 28px;
      text-align: center;
      background: rgba(10, 16, 52, 0.9);
      box-shadow: 0 0 40px rgba(76, 201, 240, 0.25);
    }

    .atom {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
    }

    .nucleus {
      position: absolute;
      top: 45px;
      left: 45px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ff4fd8;
      box-shadow: 0 0 24px #ff4fd8;
    }

    .orbit {
      position: absolute;
      inset: 14px;
      border: 2px solid #55e8ff;
      border-radius: 50%;
    }

    .orbit:nth-child(2) {
      transform: rotate(60deg);
    }

    .orbit:nth-child(3) {
      transform: rotate(120deg);
    }

    h1 {
      margin: 5px 0;
      font-size: clamp(30px, 7vw, 50px);
      color: #67edff;
    }

    h2 {
      margin: 0 0 15px;
      font-size: 22px;
      font-weight: normal;
    }

    p {
      color: #d2d8ff;
      line-height: 1.6;
    }

    .student-form {
      margin-top: 25px;
      text-align: left;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: #dce5ff;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid #4e72b8;
      border-radius: 12px;
      font-size: 16px;
      color: white;
      background: rgba(8, 15, 45, 0.9);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #58e7ff;
      box-shadow: 0 0 10px rgba(88, 231, 255, 0.4);
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 15px 28px;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      color: #09102c;
      background: linear-gradient(90deg, #53e8ff, #9b7cff);
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .error-message {
      display: none;
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      color: #ffd5df;
      background: rgba(255, 75, 120, 0.18);
      text-align: center;
    }

.shell-game {
  width: 100%;
  text-align: left;
}

.shell-topbar {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 22px;
}

.element-card {
  width: 92px;
  min-width: 92px;
  padding: 10px;
  border: 2px solid #5aa7ff;
  border-radius: 14px;
  text-align: center;
  background: linear-gradient(
    180deg,
    rgba(37, 52, 101, 0.95),
    rgba(24, 32, 69, 0.95)
  );
  box-shadow: 0 0 18px rgba(70, 154, 255, 0.45);
}

.element-number {
  color: #9ba7c9;
  font-size: 13px;
}

.element-symbol {
  margin: 4px 0;
  color: #55dfff;
  font-size: 38px;
  font-weight: bold;
}

.element-name {
  color: #dce4ff;
  font-size: 14px;
}

.shell-heading {
  flex: 1;
}

.shell-heading h2 {
  margin-bottom: 5px;
  font-size: 21px;
  line-height: 1.5;
}

.shell-heading p {
  margin: 0;
  color: #9ca8ca;
}

.atom-model {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 20px auto;
}

.atom-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1.5px solid rgba(74, 139, 231, 0.65);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.ring-k {
  width: 82px;
  height: 82px;
}

.ring-l {
  width: 140px;
  height: 140px;
}

.ring-m {
  width: 200px;
  height: 200px;
}

.ring-n {
  width: 260px;
  height: 260px;
}

.atom-nucleus {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ffd15c, #ff9d00);
  box-shadow: 0 0 20px rgba(255, 169, 23, 0.65);
  transform: translate(-50%, -50%);
}

.electron-dot {
  position: absolute;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #49cfff;
  box-shadow: 0 0 10px rgba(73, 207, 255, 0.8);
  transform: translate(-50%, -50%);
  transition: 0.25s ease;
}

.shell-controls-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 9px;
  margin-top: 10px;
}

.shell-box {
  padding: 12px 7px;
  border: 1px solid rgba(92, 124, 194, 0.38);
  border-radius: 13px;
  text-align: center;
  background: rgba(29, 40, 83, 0.88);
}

.shell-name {
  color: #55dfff;
  font-weight: bold;
}

.shell-count {
  margin: 9px 0;
  font-size: 25px;
  font-weight: bold;
}

.shell-buttons {
  display: flex;
  justify-content: center;
  gap: 7px;
}

.shell-mini-button {
  width: 32px;
  height: 32px;
  margin: 0;
  padding: 0;
  border: 1px solid #435a9a;
  border-radius: 7px;
  color: white;
  font-size: 20px;
  background: #111a3b;
}

.shell-action-grid {
  display: grid;
  grid-template-columns: 1fr 1.35fr;
  gap: 10px;
  margin-top: 22px;
}

.shell-action-grid button {
  margin: 0;
  border-radius: 11px;
}

.hint-button {
  border: 1px solid #f2c652;
  color: #ffe27e;
  background: rgba(83, 61, 14, 0.45);
}

.check-button {
  color: white;
  background: linear-gradient(90deg, #20c66c, #35dd79);
}

.shell-secondary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.shell-secondary-grid button {
  margin: 0;
  border: 1px solid #455588;
  border-radius: 11px;
  color: #dce5ff;
  background: rgba(12, 20, 52, 0.9);
}

@media (max-width: 520px) {
  .game-card {
    padding: 24px 14px;
  }

  .shell-topbar {
    align-items: flex-start;
  }

  .element-card {
    width: 82px;
    min-width: 82px;
  }

 .atom-model {
  width: 300px;
  height: 300px;
  max-width: 100%;
}

  .shell-controls-grid {
    gap: 6px;
  }

  .shell-box {
    padding: 10px 4px;
  }

  .shell-action-grid {
    grid-template-columns: 1fr 1fr;
  }
}
    .orbital-game {

}

.orbital-question-card {

}

.orbital-element-row {

.orbital-area {

.subshell-row {

.subshell-label {

.orbital-boxes {

}

.orbital-box {

}

.orbital-box:hover {

}

.orbital-rule-card {
  margin-top: 18px;
  padding: 15px;
  border-radius: 14px;

  background: rgba(83, 232, 255, 0.08);

}

.orbital-actions {

}

.orbital-actions button {

@media (max-width: 520px) {
  .subshell-row {

  .orbital-box {

  .orbital-element-row {

  }
}

}

.atomic-radius-question-card {
  padding: 20px;

}

.atomic-choice-grid {
  display: grid;

}

.atomic-choice-button {
  min-height: 145px;

  border: 2px solid #52689f;

  color: white;
  background: rgba(11, 20, 53, 0.96);

.atomic-choice-button:hover {
  border-color: #67edff;

}

.atomic-choice-button.selected {
  border-color: #ff79c9;
  background: rgba(255, 77, 171, 0.16);

.atomic-choice-symbol {

.atomic-visual-card {

<body>
  <main class="game-card">
    <div class="atom">
      <div class="nucleus"></div>
      <div class="orbit"></div>
      <div class="orbit"></div>
      <div class="orbit"></div>
    </div>

    <h1>Electron Orbit Quest</h1>
    <h2>ภารกิจพิชิตการจัดเรียงอิเล็กตรอน</h2>

    <p>
      ลงทะเบียนผู้เล่นก่อนเริ่มต้นภารกิจ
      และเตรียมตัวออกเดินทางสู่โลกของอะตอม
    </p>

    <form class="student-form" id="studentForm">
      <label for="studentName">ชื่อ–นามสกุล</label>
      <input
        type="text"
        id="studentName"
        placeholder="เช่น เด็กหญิงอะตอม สดใส"
      >

      <label for="studentClass">ชั้นเรียน</label>
      <select id="studentClass">
        <option value="">-- เลือกชั้นเรียน --</option>
        <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
        <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
        <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
        <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
        <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
        <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
      </select>

      <label for="studentNumber">เลขที่</label>
      <input
        type="number"
        id="studentNumber"
        min="1"
        max="60"
        placeholder="เช่น 15"
      >

      <div class="error-message" id="errorMessage">
        กรุณากรอกข้อมูลให้ครบทุกช่อง
      </div>

      <button type="submit">🚀 เริ่มต้นภารกิจ</button>
    </form>
  </main>

 <script>
  const studentForm = document.getElementById("studentForm");
  const errorMessage = document.getElementById("errorMessage");

  studentForm.addEventListener("submit", function (event) {
    event.preventDefault();

    const studentName =
      document.getElementById("studentName").value.trim();

    const studentClass =
      document.getElementById("studentClass").value;

    const studentNumber =
      document.getElementById("studentNumber").value;

    if (!studentName || !studentClass || !studentNumber) {
      errorMessage.style.display = "block";
      return;
    }

    errorMessage.style.display = "none";

    const studentData = {
      name: studentName,
      className: studentClass,
      number: studentNumber
    };

    localStorage.setItem(
      "electronOrbitStudent",
      JSON.stringify(studentData)
    );

    showLevelMap(studentData);
  });

  function showLevelMap(studentData) {
    document.querySelector(".game-card").innerHTML = `
      <div class="level-map">

        <p style="
          color:#67edff;
          font-weight:bold;
          margin-bottom:8px;
        ">
          ผู้เล่น: ${studentData.name}
          | ชั้น ${studentData.className}
          | เลขที่ ${studentData.number}
        </p>

        <h1 style="
          font-size:clamp(34px,7vw,48px);
          margin-bottom:8px;
        ">
          แผนที่ภารกิจ
        </h1>

        <p style="
          color:#d2d8ff;
          margin-bottom:26px;
        ">
          เลือกด่านที่ต้องการเรียนรู้
        </p>

        <div style="
          display:grid;
          grid-template-columns:repeat(2, minmax(0, 1fr));
          gap:14px;
        ">

          <button
            onclick="showLessonFromMap()"
            style="
              margin:0;
              min-height:125px;
              border-radius:18px;
              display:flex;
              flex-direction:column;
              justify-content:center;
              align-items:center;
              gap:8px;
            "
          >
            <span style="font-size:34px;">⚛️</span>
            <strong>ด่านที่ 1</strong>
            <span style="font-size:14px;">
              เลขอะตอมและจำนวนอิเล็กตรอน
            </span>
          </button>

          <button
  onclick="showLevelTwoLessonFromMap()"
  style="
    margin:0;
    min-height:125px;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:8px;
    background:linear-gradient(135deg,#7b5cff,#3ed7ff);
  "
>
  <span style="font-size:34px;">🪐</span>

  <strong>ด่านที่ 2</strong>

  <span style="font-size:14px;">
    การจัดเรียงอิเล็กตรอนแบบเชลล์
  </span>
</button>

let currentQuestionIndex = 0;
let score = 0;
let hearts = 3;
let selectedQuestions = [];
let answerLocked = false;
   
   function startQuiz() {
  currentQuestionIndex = 0;
  score = 0;
  hearts = 3;
  answerLocked = false;

  selectedQuestions = shuffleQuestions([...levelOneQuestions]);

  showQuestion();
}
   function shuffleQuestions(questions) {
  for (let i = questions.length - 1; i > 0; i--) {
    const randomIndex = Math.floor(Math.random() * (i + 1));

    [questions[i], questions[randomIndex]] = [
      questions[randomIndex],
      questions[i]
    ];
  }

  return questions;
}
   function showQuestion() {
  answerLocked = false;

  const question = selectedQuestions[currentQuestionIndex];
  const totalQuestions = selectedQuestions.length;
  const progress =
    ((currentQuestionIndex + 1) / totalQuestions) * 100;

  document.querySelector(".game-card").innerHTML = `

        </div>

          ${displayHearts()}
        </div>

      ">

      </h2>

      <div id="choiceContainer">
        ${question.choices
          .map(
            (choice, index) => `
              <button
                class="choice-button"
                onclick="checkAnswer(${index}, this)"
                style="
                  width:100%;

            `
          )
          .join("")}
      </div>

      <div
        id="feedbackBox"

        "
      ></div>

        ข้อต่อไป →
      </button>

    </div>
  `;
}
   function displayHearts() {
  let heartDisplay = "";

  for (let i = 0; i < 3; i++) {
    heartDisplay += i < hearts ? "❤️" : "🖤";
  }

  return heartDisplay;
}
   function checkAnswer(selectedIndex, selectedButton) {
  if (answerLocked) {
    return;
  }

  answerLocked = true;

  const question = selectedQuestions[currentQuestionIndex];
  const buttons = document.querySelectorAll(".choice-button");
  const feedbackBox = document.getElementById("feedbackBox");
  const nextButton = document.getElementById("nextButton");

  buttons.forEach(function (button) {
    button.disabled = true;
    button.style.cursor = "not-allowed";
    button.style.opacity = "0.75";
  });

  buttons[question.answer].style.background =
    "rgba(46, 204, 113, 0.28)";

  buttons[question.answer].style.borderColor =
    "#2ecc71";

  if (selectedIndex === question.answer) {
    score += 10;

    selectedButton.style.background =
      "rgba(46, 204, 113, 0.28)";

    selectedButton.style.borderColor =
      "#2ecc71";

    feedbackBox.innerHTML = `
      <strong style="color:#74f5a7;">
        ✅ ถูกต้อง! ได้รับ 10 คะแนน
      </strong>

      <p style="margin-bottom:0;">
        ${question.explanation}
      </p>
    `;

    feedbackBox.style.background =
      "rgba(46,204,113,0.14)";

    feedbackBox.style.border =
      "1px solid rgba(46,204,113,0.5)";
  } else {
    hearts -= 1;

    selectedButton.style.background =
      "rgba(255,82,112,0.25)";

    selectedButton.style.borderColor =
      "#ff5270";

    feedbackBox.innerHTML = `
      <strong style="color:#ff91a5;">
        ❌ ยังไม่ถูกต้อง เสียหัวใจ 1 ดวง
      </strong>

      <p>
        คำตอบที่ถูกคือ
        <strong>${question.choices[question.answer]}</strong>
      </p>

      <p style="margin-bottom:0;">
        ${question.explanation}
      </p>
    `;

    feedbackBox.style.background =
      "rgba(255,82,112,0.13)";

    feedbackBox.style.border =
      "1px solid rgba(255,82,112,0.5)";
  }

  feedbackBox.style.display = "block";

  if (hearts <= 0) {
    nextButton.textContent = "ดูผลภารกิจ";
  } else if (
    currentQuestionIndex === selectedQuestions.length - 1
  ) {
    nextButton.textContent = "ดูผลภารกิจ";
  } else {
    nextButton.textContent = "ข้อต่อไป →";
  }

  nextButton.style.display = "block";
}
   function nextQuestion() {
  if (
    hearts <= 0 ||
    currentQuestionIndex >= selectedQuestions.length - 1
  ) {
    showResult();
    return;
  }

  currentQuestionIndex += 1;
  showQuestion();
}
   function showResult() {
  const studentData = JSON.parse(
    localStorage.getItem("electronOrbitStudent")
  );

  const totalQuestions = selectedQuestions.length;
  const maxScore = totalQuestions * 10;
  const percentage = Math.round((score / maxScore) * 100);

  let resultLevel = "";
  let resultStars = "";
  let resultMessage = "";

  if (percentage >= 90) {
    resultLevel = "Electron Master";
    resultStars = "⭐⭐⭐";
    resultMessage = "ยอดเยี่ยมมาก! คุณเชี่ยวชาญเรื่องเลขอะตอมแล้ว";
  } else if (percentage >= 75) {
    resultLevel = "Atomic Explorer";
    resultStars = "⭐⭐";
    resultMessage = "ทำได้ดีมาก อีกนิดเดียวก็เป็นผู้เชี่ยวชาญแล้ว";
  } else if (percentage >= 60) {
    resultLevel = "Orbit Trainee";
    resultStars = "⭐";
    resultMessage = "ผ่านภารกิจแล้ว ลองฝึกเพิ่มเติมอีกเล็กน้อย";
  } else {
    resultLevel = "Try Again Hero";
    resultStars = "🔄";
    resultMessage = "ยังไม่ผ่านภารกิจ แต่คุณสามารถลองใหม่ได้เสมอ";
  }

  const resultData = {
    name: studentData.name,
    className: studentData.className,
    number: studentData.number,
    score: score,
    maxScore: maxScore,
    percentage: percentage,
    level: resultLevel,
    date: new Date().toLocaleString("th-TH")
  };

  localStorage.setItem(
    "electronOrbitLatestResult",
    JSON.stringify(resultData)
  );

  document.querySelector(".game-card").innerHTML = `
    <div class="result-page">

      <div style="font-size:60px; margin-bottom:10px;">
        ${resultStars}
      </div>

      <h1 style="font-size:clamp(34px,7vw,48px);">
        สรุปผลภารกิจ

function displayValenceHearts() {
  let heartDisplay = "";

  for (let i = 0; i < 3; i++) {
    heartDisplay +=
      i < valenceHearts ? "❤️" : "🖤";
  }

  return heartDisplay;
}

function checkValenceAnswer(
  selectedAnswer,
  selectedButton
) {
  if (valenceAnswerLocked) {
    return;
  }

  valenceAnswerLocked = true;

  const question =
    selectedValenceQuestions[
      currentValenceQuestionIndex
    ];

  const buttons =
    document.querySelectorAll(
      ".valence-choice"
    );

  const feedbackBox =
    document.getElementById(
      "valenceFeedback"
    );

  const nextButton =
    document.getElementById(
      "nextValenceButton"
    );

  buttons.forEach(function (button) {
    button.disabled = true;
    button.style.cursor = "not-allowed";
    button.style.opacity = "0.75";
  });

  const correctButton =
    [...buttons].find(
      button =>
        Number(button.textContent.trim()) ===
        question.answer
    );

  if (correctButton) {
    correctButton.style.background =
      "rgba(46,204,113,0.28)";
    correctButton.style.borderColor =
      "#2ecc71";
  }

  if (selectedAnswer === question.answer) {
    valenceScore += 10;

    selectedButton.style.background =
      "rgba(46,204,113,0.28)";
    selectedButton.style.borderColor =
      "#2ecc71";

    feedbackBox.style.background =
      "rgba(46,204,113,0.14)";
    feedbackBox.style.border =
      "1px solid rgba(46,204,113,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#74f5a7;">
        ✅ ถูกต้อง! ได้รับ 10 คะแนน
      </strong>

      <p style="margin-bottom:0;">
        การจัดเรียงแบบเชลล์ของ
        ${question.element}
        คือ
        <strong>${question.shellText}</strong>
        เชลล์นอกสุดคือ
        <strong>${question.outerShell}</strong>
        และมีอิเล็กตรอน
        <strong>${question.answer} ตัว</strong>
      </p>
    `;
  } else {
    valenceHearts -= 1;

    selectedButton.style.background =
      "rgba(255,82,112,0.25)";
    selectedButton.style.borderColor =
      "#ff5270";

    feedbackBox.style.background =
      "rgba(255,82,112,0.13)";
    feedbackBox.style.border =
      "1px solid rgba(255,82,112,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#ff91a5;">
        ❌ ยังไม่ถูกต้อง เสียหัวใจ 1 ดวง
      </strong>

      <p style="margin-bottom:0;">
        ดูตัวเลขตำแหน่งสุดท้ายของ
        <strong>${question.shellText}</strong>
        จึงได้เวเลนซ์อิเล็กตรอน
        <strong>${question.answer} ตัว</strong>
      </p>
    `;
  }

  feedbackBox.style.display = "block";

  if (
    valenceHearts <= 0 ||
    currentValenceQuestionIndex ===
      selectedValenceQuestions.length - 1
  ) {
    nextButton.textContent =
      "ดูผลภารกิจ";
  } else {
    nextButton.textContent =
      "ข้อต่อไป →";
  }

  nextButton.style.display = "block";
}

function nextValenceQuestion() {

    valenceHearts <= 0 ||
    currentValenceQuestionIndex >=
      selectedValenceQuestions.length - 1

  currentValenceQuestionIndex += 1;

  showValenceQuestion();
}

   function createElectronDots(
  shellName,
  electronCount,
  radius
) {
  if (electronCount <= 0) {
    return "";
  }

  let dots = "";

  for (let i = 0; i < electronCount; i++) {
    const angle =
      -90 + (360 / electronCount) * i;

    const angleInRadians =
      angle * (Math.PI / 180);

    const center = 150;

    const x =
      center +
      radius * Math.cos(angleInRadians);

    const y =
      center +
      radius * Math.sin(angleInRadians);

    dots += `
      <div
        class="electron-dot"
        title="อิเล็กตรอนในเชลล์ ${shellName}"
        style="
          left:${x}px;
          top:${y}px;
        "
      ></div>
    `;
  }

  return dots;
}

   function changeModernShellValue(
  shellName,
  amount,
  maximum
) {
  if (shellAnswerLocked) {
    return;
  }

  const currentTotal =
    shellValues.K +
    shellValues.L +
    shellValues.M +
    shellValues.N;
  if (
    amount > 0 &&
    currentTotal >= shellQuestion.atomicNumber
  ) {
    alert(
      "จัดอิเล็กตรอนครบ " +
      shellQuestion.atomicNumber +
      " ตัวแล้ว"
    );

    return;
  }

  const newValue =
    shellValues[shellName] + amount;

  if (newValue < 0 || newValue > maximum) {
    return;
  }

  shellValues[shellName] = newValue;

  showShellBuilder();
}

   function getShellAnswerText(answer) {
  const values = [
    answer.K,
    answer.L,
    answer.M,
    answer.N
  ];

  while (
    values.length > 1 &&
    values[values.length - 1] === 0
  ) {
    values.pop();
  }

  return values.join(", ");
}
   function checkShellAnswer() {
  if (shellAnswerLocked) {
    return;
  }

  const feedbackBox =
    document.getElementById("shellFeedback");

  const totalElectrons =
    shellValues.K +
    shellValues.L +
    shellValues.M +
    shellValues.N;

  if (totalElectrons !== shellQuestion.atomicNumber) {
    feedbackBox.style.display = "block";
    feedbackBox.style.background =
      "rgba(255,184,76,0.12)";
    feedbackBox.style.border =
      "1px solid rgba(255,184,76,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#ffe0a6;">
        ⚠️ จำนวนอิเล็กตรอนยังไม่ครบ

        ${shellQuestion.atomicNumber} ตัว
        ขณะนี้จัดแล้ว ${totalElectrons} ตัว
      </p>
    `;

    return;
  }

  const isCorrect =
    shellValues.K === shellQuestion.correctAnswer.K &&
    shellValues.L === shellQuestion.correctAnswer.L &&
    shellValues.M === shellQuestion.correctAnswer.M &&
    shellValues.N === shellQuestion.correctAnswer.N;

  feedbackBox.style.display = "block";

  if (isCorrect) {
    shellAnswerLocked = true;
    shellScore += 10;

   function checkAufbauAnswer() {
  if (aufbauAnswerLocked) {
    return;
  }

  const question =
    selectedAufbauQuestions[currentAufbauQuestionIndex];

  const feedback =
    document.getElementById("aufbauFeedback");

  if (
    selectedAufbauOrder.length !==
    question.answer.length
  ) {
    feedback.style.display = "block";
    feedback.style.background =
      "rgba(255,184,76,0.12)";
    feedback.style.border =
      "1px solid rgba(255,184,76,0.55)";

    feedback.innerHTML = `

        ต้องเลือกทั้งหมด ${question.answer.length} ตำแหน่ง
      </p>
    `;

    return;
  }

  const isCorrect =
    selectedAufbauOrder.every(
      (item, index) =>
        item === question.answer[index]
    );

  aufbauAnswerLocked = true;

  if (isCorrect) {
    aufbauScore += 10;

    feedback.style.display = "block";
    feedback.style.background =
      "rgba(46,204,113,0.14)";
    feedback.style.border =
      "1px solid rgba(46,204,113,0.55)";

        }
      </button>
    `;
  } else {
    aufbauHearts -= 1;

    feedback.style.display = "block";
    feedback.style.background =
      "rgba(255,82,112,0.13)";
    feedback.style.border =
      "1px solid rgba(255,82,112,0.55)";

   function cycleOrbitalState(
  subshellName,

   function getOrbitalStateElectronCount(state) {
  if (state === "↑↓") {
    return 2;
  }

  if (state === "↑") {
    return 1;
  }

  return 0;
}

function countPlacedOrbitalElectrons() {
  let total = 0;

  Object.values(orbitalStates)
    .forEach(function (states) {
      states.forEach(function (state) {
        total +=
          getOrbitalStateElectronCount(state);
      });
    });

  return total;
}

function displayOrbitalHearts() {
  let result = "";

  for (let i = 0; i < 3; i++) {
    result +=
      i < orbitalHearts ? "❤️" : "🖤";
  }

  return result;
}
   function validateOrbitalSubshell(
  subshell,
  states
) {
  const counts = states.map(
    getOrbitalStateElectronCount
  );

  const total =
    counts.reduce(
      (sum, value) => sum + value,
      0
    );

  if (total !== subshell.electrons) {
    return false;
  }

  if (subshell.type === "s") {
    return counts[0] === subshell.electrons;
  }

  if (subshell.type === "p") {
    const pairCount =
      counts.filter(value => value === 2).length;

    const singleCount =
      counts.filter(value => value === 1).length;

    const expectedPairs =
      Math.max(0, subshell.electrons - 3);

    const expectedSingles =
      subshell.electrons -
      expectedPairs * 2;

    return (
      pairCount === expectedPairs &&
      singleCount === expectedSingles
    );
  }

  return false;
}

function isOrbitalAnswerCorrect(question) {
  return question.subshells.every(
    function (subshell) {
      return validateOrbitalSubshell(
        subshell,
        orbitalStates[subshell.name]
      );
    }
  );

   function createCationElectronDots(

    const center = 150;

      center + radius * Math.cos(radians);

      center + radius * Math.sin(radians);

    dots += `

          padding:0;
          border:none;
        "
      ></button>
    `;
  }

  return dots;
}

   function removeCationElectron(shellName) {
  if (cationAnswerLocked) {
    return;
  }

  const question =
    selectedCationQuestions[
      currentCationQuestionIndex
    ];

  if (
    cationRemovedElectrons >=
    question.removeCount
  ) {
    alert(
      "นำอิเล็กตรอนออกครบจำนวนที่กำหนดแล้ว"
    );
    return;
  }

  const outermostShell =
    getOutermostCationShell();

  if (shellName !== outermostShell) {
    alert(
      "ต้องนำอิเล็กตรอนออกจากเชลล์นอกสุดก่อน\n" +
      "เชลล์นอกสุดขณะนี้คือ " +
      outermostShell
    );
    return;
  }

  if (cationShellValues[shellName] <= 0) {
    return;
  }

  cationShellValues[shellName] -= 1;
  cationRemovedElectrons += 1;

  showCationQuestion();
}

   function checkCationAnswer() {
  if (cationAnswerLocked) {
    return;
  }

  const question =
    selectedCationQuestions[
      currentCationQuestionIndex
    ];

  const feedback =
    document.getElementById(
      "cationFeedback"
    );

  if (
    cationRemovedElectrons !==
    question.removeCount
  ) {
    feedback.style.display = "block";
    feedback.style.background =
      "rgba(255,184,76,0.12)";
    feedback.style.border =
      "1px solid rgba(255,184,76,0.55)";

    feedback.innerHTML = `
      <strong style="color:#ffe0a6;">
        ⚠️ นำอิเล็กตรอนออกยังไม่ครบ
      </strong>

      <p style="margin-bottom:0;">
        ต้องนำออก
        ${question.removeCount} ตัว
        ขณะนี้นำออกแล้ว
        ${cationRemovedElectrons} ตัว
      </p>
    `;

    return;
  }

  const expectedShells = {
    ...question.initialShells
  };

  let remainingToRemove =
    question.removeCount;

  ["N", "M", "L", "K"].forEach(
    function (shellName) {
      if (remainingToRemove <= 0) {
        return;
      }

      const removedFromShell =
        Math.min(
          expectedShells[shellName],
          remainingToRemove
        );

      expectedShells[shellName] -=
        removedFromShell;

      remainingToRemove -=
        removedFromShell;
    }
  );

  const isCorrect =
    ["K", "L", "M", "N"].every(
      shellName =>
        cationShellValues[shellName] ===
        expectedShells[shellName]
    );

  cationAnswerLocked = true;

  if (isCorrect) {
    cationScore += 10;

    feedback.style.display = "block";
    feedback.style.background =
      "rgba(46,204,113,0.14)";
    feedback.style.border =
      "1px solid rgba(46,204,113,0.55)";

   function addAnionElectron() {
  if (anionAnswerLocked) {
    return;

  const question =
    selectedAnionQuestions[
      currentAnionQuestionIndex

  if (
    anionAddedElectrons >=
    question.addCount
  ) {
    alert(
      "รับอิเล็กตรอนครบจำนวนที่กำหนดแล้ว"
    );

    return;
  }

  const outermostShell =
    getOutermostAnionShell();

  const shellCapacity = {
    K: 2,
    L: 8,
    M: 8,
    N: 2
  };

  if (
    anionShellValues[outermostShell] >=
    shellCapacity[outermostShell]
  ) {
    alert(
      "เชลล์นอกสุดเต็มแล้ว"
    );

    return;
  }

  anionShellValues[outermostShell] += 1;
  anionAddedElectrons += 1;

  showAnionQuestion();
}

   function createAtomicRadiusVisual(element) {
  const stageSize = 230;
  const center = stageSize / 2;

  const maximumShellRadius =
    element.visualRadius;

  let shellHtml = "";
  let electronHtml = "";

  element.shells.forEach(
    function (electronCount, shellIndex) {
      const shellRadius =
        maximumShellRadius *
        ((shellIndex + 1) /
          element.shells.length);

      const shellDiameter =
        shellRadius * 2;

      shellHtml += `
        <div
          class="radius-shell"
          style="
            width:${shellDiameter}px;
            height:${shellDiameter}px;
          "
        ></div>
      `;

      for (
        let electronIndex = 0;
        electronIndex < electronCount;
        electronIndex++
      ) {
        const angle =
          -90 +
          (360 / electronCount) *
          electronIndex;

        const radians =
          angle * Math.PI / 180;

        const x =
          center +
          shellRadius *
          Math.cos(radians);

        const y =
          center +
          shellRadius *
          Math.sin(radians);

        electronHtml += `
          <div
            class="radius-electron"
            style="
              left:${x}px;
              top:${y}px;
            "
          ></div>
        `;
      }
    }
  );

  return `
    <div class="atomic-visual-card">

      <div style="
        color:#67edff;
        font-size:30px;
        font-weight:bold;
      ">
        ${element.symbol}
      </div>

      <div style="color:#dce5ff;">
        ${element.name}
      </div>

      <div style="
        margin-top:6px;
        color:#ffe0a6;
      ">
        ${element.shells.join(", ")}
      </div>

      <div class="atomic-visual-stage">

        <div
          style="
            position:absolute;
            left:50%;
            top:50%;
            width:${stageSize}px;
            height:${stageSize}px;
            transform:translate(-50%,-50%);
          "
        >
          ${shellHtml}

          <div class="radius-nucleus"></div>

          ${electronHtml}
        </div>

      </div>

      <div style="color:#aeb9da;">
        จำนวนเชลล์:
        <strong>${element.shells.length}</strong>
      </div>

    </div>
  `;
}

        </p>
      </div>

      <div style="
        margin-top:15px;
        padding:14px;
        border-radius:13px;
        background:rgba(155,124,255,0.12);
      ">
        <strong style="color:#c9b8ff;">
          การจัดเรียงอิเล็กตรอน
        </strong>

        <p style="margin-bottom:0;">
          ${question.elementA.symbol}
          :
          ${question.elementA.shells.join(", ")}
          <br>

          ${question.elementB.symbol}
          :
          ${question.elementB.shells.join(", ")}
        </p>
      </div>

      <button
        onclick="nextAtomicRadiusQuestion()"
        style="margin-top:16px;"
      >
        ${
          atomicRadiusHearts <= 0 ||
          currentAtomicRadiusQuestionIndex ===
          selectedAtomicRadiusQuestions.length - 1
            ? "ดูผลภารกิจ"
            : "ข้อต่อไป →"
        }
      </button>

    </div>
  `;
}
   function nextAtomicRadiusQuestion() {
  if (
    atomicRadiusHearts <= 0 ||
    currentAtomicRadiusQuestionIndex >=
      selectedAtomicRadiusQuestions.length - 1
  ) {
    showLevelEightResult();
    return;
  }

  currentAtomicRadiusQuestionIndex += 1;

  showAtomicRadiusQuestion();
}
   function showLevelEightResult() {
  const studentData = JSON.parse(
    localStorage.getItem(
      "electronOrbitStudent"
    )
  );

  const maxScore =
    selectedAtomicRadiusQuestions.length *
    10;

  const percentage = Math.round(
    (atomicRadiusScore / maxScore) * 100
  );

  let level = "Try Again Hero";
  let stars = "🔄";
  let message =
    "ทบทวนแนวโน้มขนาดอะตอมแล้วลองใหม่อีกครั้ง";

  if (percentage >= 90) {
    level = "Electron Master";
    stars = "⭐⭐⭐";
    message =
      "ยอดเยี่ยมมาก! คุณเปรียบเทียบขนาดอะตอมได้อย่างแม่นยำ";
  } else if (percentage >= 75) {
    level = "Atomic Explorer";
    stars = "⭐⭐";
    message =
      "ทำได้ดีมาก คุณเข้าใจแนวโน้มในคาบและในหมู่แล้ว";
  } else if (percentage >= 60) {
    level = "Orbit Trainee";
    stars = "⭐";
    message =
      "ผ่านภารกิจแล้ว ลองฝึกเปรียบเทียบจำนวนเชลล์เพิ่มเติม";
  }

  const resultData = {
    name: studentData.name,
    className: studentData.className,
    number: studentData.number,
    levelNumber: 8,
    score: atomicRadiusScore,
    maxScore: maxScore,
    percentage: percentage,
    hearts: atomicRadiusHearts,
    level: level,
    date: new Date().toLocaleString(
      "th-TH"
    )
  };

  localStorage.setItem(
    "electronOrbitLevelEightResult",
    JSON.stringify(resultData)
  );

  document.querySelector(".game-card").innerHTML = `
    <div class="result-page">

      <div style="font-size:58px;">
        ${stars}
      </div>

      <h1>
        สรุปผลด่านที่ 8
      </h1>

      <h2 style="color:#c9b8ff;">
        ${level}
      </h2>

      <p>
        ${message}
      </p>

      <div style="
        margin:24px 0;
        padding:24px;
        border:1px solid #4e72b8;
        border-radius:18px;
        background:rgba(8,15,45,0.75);
        text-align:left;
      ">
        <p>
          <strong>ผู้เล่น:</strong>
          ${studentData.name}
        </p>

        <p>
          <strong>ชั้น:</strong>
          ${studentData.className}
        </p>

        <p>
          <strong>เลขที่:</strong>
          ${studentData.number}
        </p>

        <p>
          <strong>คะแนน:</strong>
          ${atomicRadiusScore}
          / ${maxScore}
        </p>

        <p>
          <strong>คิดเป็น:</strong>
          ${percentage}%
        </p>

        <p>
          <strong>หัวใจที่เหลือ:</strong>
          ${displayAtomicRadiusHearts()}
        </p>
      </div>

      <button onclick="startLevelEightQuiz()">
        🔄 เล่นด่านที่ 8 อีกครั้ง
      </button>

      <button
        onclick="showLevelEightLessonFromMap()"
        style="
          margin-top:12px;
          color:#dce5ff;
          background:rgba(12,20,52,0.9);
          border:1px solid #455588;
        "
      >
        📖 ทบทวนบทเรียน
      </button>

      <button
        onclick="backToLevelMap()"
        style="
          margin-top:12px;
          color:#67edff;
          background:transparent;
          border:1px solid #67edff;
        "
      >
        🗺️ กลับหน้าเลือกด่าน
      </button>

    </div>
  `;
}
   
</script>

</body>
</html>
