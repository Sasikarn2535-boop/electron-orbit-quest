<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Electron Orbit Quest</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top, #263e88, transparent 40%),
        linear-gradient(135deg, #070b24, #15134d);
    }

    .game-card {
      width: 100%;
      max-width: 620px;
      padding: 35px 28px;
      border: 1px solid rgba(94, 234, 255, 0.5);
      border-radius: 28px;
      text-align: center;
      background: rgba(10, 16, 52, 0.9);
      box-shadow: 0 0 40px rgba(76, 201, 240, 0.25);
    }

    .atom {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
    }

    .nucleus {
      position: absolute;
      top: 45px;
      left: 45px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ff4fd8;
      box-shadow: 0 0 24px #ff4fd8;
    }

    .orbit {
      position: absolute;
      inset: 14px;
      border: 2px solid #55e8ff;
      border-radius: 50%;
    }

    .orbit:nth-child(2) {
      transform: rotate(60deg);
    }

    .orbit:nth-child(3) {
      transform: rotate(120deg);
    }

    h1 {
      margin: 5px 0;
      font-size: clamp(30px, 7vw, 50px);
      color: #67edff;
    }

    h2 {
      margin: 0 0 15px;
      font-size: 22px;
      font-weight: normal;
    }

    p {
      color: #d2d8ff;
      line-height: 1.6;
    }

    .student-form {
      margin-top: 25px;
      text-align: left;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: #dce5ff;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid #4e72b8;
      border-radius: 12px;
      font-size: 16px;
      color: white;
      background: rgba(8, 15, 45, 0.9);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #58e7ff;
      box-shadow: 0 0 10px rgba(88, 231, 255, 0.4);
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 15px 28px;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      color: #09102c;
      background: linear-gradient(90deg, #53e8ff, #9b7cff);
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .error-message {
      display: none;
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      color: #ffd5df;
      background: rgba(255, 75, 120, 0.18);
      text-align: center;
    }

.shell-game {
  width: 100%;
  text-align: left;
}

.shell-topbar {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 22px;
}

.element-card {
  width: 92px;
  min-width: 92px;
  padding: 10px;
  border: 2px solid #5aa7ff;
  border-radius: 14px;
  text-align: center;
  background: linear-gradient(
    180deg,
    rgba(37, 52, 101, 0.95),
    rgba(24, 32, 69, 0.95)
  );
  box-shadow: 0 0 18px rgba(70, 154, 255, 0.45);
}

.element-number {
  color: #9ba7c9;
  font-size: 13px;
}

.element-symbol {
  margin: 4px 0;
  color: #55dfff;
  font-size: 38px;
  font-weight: bold;
}

.element-name {
  color: #dce4ff;
  font-size: 14px;
}

.shell-heading {
  flex: 1;
}

.shell-heading h2 {
  margin-bottom: 5px;
  font-size: 21px;
  line-height: 1.5;
}

.shell-heading p {
  margin: 0;
  color: #9ca8ca;
}

.atom-model {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 20px auto;
}

.atom-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1.5px solid rgba(74, 139, 231, 0.65);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.ring-k {
  width: 82px;
  height: 82px;
}

.ring-l {
  width: 140px;
  height: 140px;
}

.ring-m {
  width: 200px;
  height: 200px;
}

.ring-n {
  width: 260px;
  height: 260px;
}

.atom-nucleus {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ffd15c, #ff9d00);
  box-shadow: 0 0 20px rgba(255, 169, 23, 0.65);
  transform: translate(-50%, -50%);
}

.electron-dot {
  position: absolute;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #49cfff;
  box-shadow: 0 0 10px rgba(73, 207, 255, 0.8);
  transform: translate(-50%, -50%);
  transition: 0.25s ease;
}

.shell-controls-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 9px;
  margin-top: 10px;
}

.shell-box {
  padding: 12px 7px;
  border: 1px solid rgba(92, 124, 194, 0.38);
  border-radius: 13px;
  text-align: center;
  background: rgba(29, 40, 83, 0.88);
}

.shell-name {
  color: #55dfff;
  font-weight: bold;
}

.shell-count {
  margin: 9px 0;
  font-size: 25px;
  font-weight: bold;
}

.shell-buttons {
  display: flex;
  justify-content: center;
  gap: 7px;
}

.shell-mini-button {
  width: 32px;
  height: 32px;
  margin: 0;
  padding: 0;
  border: 1px solid #435a9a;
  border-radius: 7px;
  color: white;
  font-size: 20px;
  background: #111a3b;
}

.shell-action-grid {
  display: grid;
  grid-template-columns: 1fr 1.35fr;
  gap: 10px;
  margin-top: 22px;
}

.shell-action-grid button {
  margin: 0;
  border-radius: 11px;
}

.hint-button {
  border: 1px solid #f2c652;
  color: #ffe27e;
  background: rgba(83, 61, 14, 0.45);
}

.check-button {
  color: white;
  background: linear-gradient(90deg, #20c66c, #35dd79);
}

.shell-secondary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.shell-secondary-grid button {
  margin: 0;
  border: 1px solid #455588;
  border-radius: 11px;
  color: #dce5ff;
  background: rgba(12, 20, 52, 0.9);
}

@media (max-width: 520px) {
  .game-card {
    padding: 24px 14px;
  }

  .shell-topbar {
    align-items: flex-start;
  }

  .element-card {
    width: 82px;
    min-width: 82px;
  }

 .atom-model {
  width: 300px;
  height: 300px;
  max-width: 100%;
}

  .shell-controls-grid {
    gap: 6px;
  }

  .shell-box {
    padding: 10px 4px;
  }

  .shell-action-grid {
    grid-template-columns: 1fr 1fr;
  }
}
    .orbital-game {
  width: 100%;

}

.orbital-question-card {
  padding: 18px;
  border: 1px solid #435887;
  border-radius: 18px;
  background: rgba(19, 29, 69, 0.9);
}

.orbital-element-row {
  display: flex;
  align-items: center;
  gap: 16px;

}

.orbital-area {

}

.subshell-row {
  display: grid;

.subshell-label {

  text-align: center;
}

.orbital-boxes {

}

.orbital-box {
  width: 58px;

  padding: 0;
  border: 2px solid #53699f;

  color: white;
  background: rgba(9, 17, 48, 0.95);
  font-size: 23px;
  font-weight: bold;
}

.orbital-box:hover {
  border-color: #67edff;

}

.orbital-rule-card {
  margin-top: 18px;
  padding: 15px;
  border-radius: 14px;
  color: #dce5ff;
  background: rgba(83, 232, 255, 0.08);
  border: 1px solid rgba(83, 232, 255, 0.3);
}

.orbital-actions {

@media (max-width: 520px) {

    .atomic-radius-game {

}

.atomic-choice-grid {

}

.atomic-choice-button {
  min-height: 145px;
  margin: 0;
  padding: 18px 12px;
  border: 2px solid #52689f;
  border-radius: 16px;
  color: white;
  background: rgba(11, 20, 53, 0.96);
  transition: 0.2s ease;
}

.atomic-choice-button:hover {
  border-color: #67edff;
  transform: translateY(-3px);
  box-shadow: 0 0 18px rgba(103, 237, 255, 0.25);
}

.atomic-choice-button.selected {
  border-color: #ff79c9;

}

.atomic-choice-symbol {

.atomic-choice-name {
  margin-top: 5px;

}

.atomic-choice-position {
  margin-top: 10px;

}

.atomic-radius-actions {

  gap: 10px;

}

.atomic-radius-actions button {
  margin: 0;
}

.atomic-comparison-area {
  display: grid;
  grid-template-columns: 1fr 70px 1fr;
  align-items: center;
  gap: 12px;
  margin-top: 18px;
}

.atomic-visual-card {
  min-width: 0;
  padding: 16px 8px;
  border: 1px solid #4c6097;
  border-radius: 16px;
  text-align: center;
  background: rgba(7, 14, 42, 0.88);
}

.atomic-visual-stage {
  position: relative;
  width: 230px;
  height: 230px;
  max-width: 100%;
  margin: 10px auto;
}

.radius-atom {
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.radius-shell {
  position: absolute;
  left: 50%;

  border: 1.5px solid rgba(103, 237, 255, 0.65);

}

.radius-nucleus {

  box-shadow: 0 0 18px rgba(255, 116, 109, 0.8);
  z-index: 4;
}

.radius-electron {
  position: absolute;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #67edff;
  box-shadow: 0 0 9px rgba(103, 237, 255, 0.95);

}

.atomic-size-label {

.atomic-comparison-sign {

  color: #ffe17c;

}

.atomic-trend-panel {
  margin-top: 18px;

}

   function startQuiz() {
  currentQuestionIndex = 0;
  score = 0;
  hearts = 3;
  answerLocked = false;

  selectedQuestions = shuffleQuestions([...levelOneQuestions]);

  showQuestion();
}
   function shuffleQuestions(questions) {
  for (let i = questions.length - 1; i > 0; i--) {
    const randomIndex = Math.floor(Math.random() * (i + 1));

    [questions[i], questions[randomIndex]] = [
      questions[randomIndex],
      questions[i]
    ];
  }

  return questions;
}
   function showQuestion() {

   function displayHearts() {
  let heartDisplay = "";

  for (let i = 0; i < 3; i++) {
    heartDisplay += i < hearts ? "❤️" : "🖤";
  }

  return heartDisplay;
}
   function checkAnswer(selectedIndex, selectedButton) {
  if (answerLocked) {
    return;
  }

  answerLocked = true;

  const question = selectedQuestions[currentQuestionIndex];
  const buttons = document.querySelectorAll(".choice-button");
  const feedbackBox = document.getElementById("feedbackBox");
  const nextButton = document.getElementById("nextButton");

  buttons.forEach(function (button) {
    button.disabled = true;
    button.style.cursor = "not-allowed";
    button.style.opacity = "0.75";
  });

  buttons[question.answer].style.background =
    "rgba(46, 204, 113, 0.28)";

  buttons[question.answer].style.borderColor =
    "#2ecc71";

  if (selectedIndex === question.answer) {
    score += 10;

    selectedButton.style.background =
      "rgba(46, 204, 113, 0.28)";

    selectedButton.style.borderColor =
      "#2ecc71";

    feedbackBox.innerHTML = `
      <strong style="color:#74f5a7;">
        ✅ ถูกต้อง! ได้รับ 10 คะแนน
      </strong>

      <p style="margin-bottom:0;">
        ${question.explanation}
      </p>
    `;

    feedbackBox.style.background =
      "rgba(46,204,113,0.14)";

    feedbackBox.style.border =
      "1px solid rgba(46,204,113,0.5)";
  } else {
    hearts -= 1;

    selectedButton.style.background =
      "rgba(255,82,112,0.25)";

    selectedButton.style.borderColor =
      "#ff5270";

    feedbackBox.innerHTML = `
      <strong style="color:#ff91a5;">
        ❌ ยังไม่ถูกต้อง เสียหัวใจ 1 ดวง
      </strong>

      <p>
        คำตอบที่ถูกคือ
        <strong>${question.choices[question.answer]}</strong>
      </p>

      <p style="margin-bottom:0;">
        ${question.explanation}
      </p>
    `;

    feedbackBox.style.background =
      "rgba(255,82,112,0.13)";

    feedbackBox.style.border =
      "1px solid rgba(255,82,112,0.5)";
  }

  feedbackBox.style.display = "block";

  if (hearts <= 0) {
    nextButton.textContent = "ดูผลภารกิจ";
  } else if (
    currentQuestionIndex === selectedQuestions.length - 1
  ) {
    nextButton.textContent = "ดูผลภารกิจ";
  } else {
    nextButton.textContent = "ข้อต่อไป →";
  }

  nextButton.style.display = "block";
}
   function nextQuestion() {
  if (
    hearts <= 0 ||
    currentQuestionIndex >= selectedQuestions.length - 1
  ) {
    showResult();
    return;
  }

  currentQuestionIndex += 1;
  showQuestion();
}

function checkValenceAnswer(
  selectedAnswer,
  selectedButton
) {
  if (valenceAnswerLocked) {
    return;
  }

  valenceAnswerLocked = true;

  const question =
    selectedValenceQuestions[
      currentValenceQuestionIndex
    ];

  const buttons =
    document.querySelectorAll(
      ".valence-choice"
    );

  const feedbackBox =
    document.getElementById(
      "valenceFeedback"
    );

  const nextButton =
    document.getElementById(
      "nextValenceButton"
    );

  buttons.forEach(function (button) {
    button.disabled = true;
    button.style.cursor = "not-allowed";
    button.style.opacity = "0.75";
  });

  const correctButton =
    [...buttons].find(
      button =>
        Number(button.textContent.trim()) ===
        question.answer
    );

  if (correctButton) {
    correctButton.style.background =
      "rgba(46,204,113,0.28)";
    correctButton.style.borderColor =
      "#2ecc71";
  }

  if (selectedAnswer === question.answer) {
    valenceScore += 10;

    selectedButton.style.background =
      "rgba(46,204,113,0.28)";
    selectedButton.style.borderColor =
      "#2ecc71";

    feedbackBox.style.background =
      "rgba(46,204,113,0.14)";
    feedbackBox.style.border =
      "1px solid rgba(46,204,113,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#74f5a7;">
        ✅ ถูกต้อง! ได้รับ 10 คะแนน
      </strong>

      <p style="margin-bottom:0;">
        การจัดเรียงแบบเชลล์ของ
        ${question.element}
        คือ
        <strong>${question.shellText}</strong>
        เชลล์นอกสุดคือ
        <strong>${question.outerShell}</strong>
        และมีอิเล็กตรอน
        <strong>${question.answer} ตัว</strong>
      </p>
    `;
  } else {
    valenceHearts -= 1;

    selectedButton.style.background =
      "rgba(255,82,112,0.25)";
    selectedButton.style.borderColor =
      "#ff5270";

    feedbackBox.style.background =
      "rgba(255,82,112,0.13)";
    feedbackBox.style.border =
      "1px solid rgba(255,82,112,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#ff91a5;">
        ❌ ยังไม่ถูกต้อง เสียหัวใจ 1 ดวง
      </strong>

      <p style="margin-bottom:0;">
        ดูตัวเลขตำแหน่งสุดท้ายของ
        <strong>${question.shellText}</strong>
        จึงได้เวเลนซ์อิเล็กตรอน
        <strong>${question.answer} ตัว</strong>
      </p>
    `;
  }

  feedbackBox.style.display = "block";

  if (
    valenceHearts <= 0 ||
    currentValenceQuestionIndex ===
      selectedValenceQuestions.length - 1
  ) {
    nextButton.textContent =
      "ดูผลภารกิจ";
  } else {
    nextButton.textContent =
      "ข้อต่อไป →";
  }

  nextButton.style.display = "block";
}

   function changeModernShellValue(
  shellName,
  amount,
  maximum

  if (shellAnswerLocked) {

  }

  const currentTotal =
    shellValues.K +
    shellValues.L +
    shellValues.M +
    shellValues.N;
  if (
    amount > 0 &&
    currentTotal >= shellQuestion.atomicNumber
  ) {
    alert(
      "จัดอิเล็กตรอนครบ " +
      shellQuestion.atomicNumber +
      " ตัวแล้ว"
    );

    return;
  }

  const newValue =
    shellValues[shellName] + amount;

  if (newValue < 0 || newValue > maximum) {
    return;
  }

  shellValues[shellName] = newValue;

  showShellBuilder();
}

    answer.N

   function checkAufbauAnswer() {
  if (aufbauAnswerLocked) {
    return;
  }

  const question =
    selectedAufbauQuestions[currentAufbauQuestionIndex];

  const feedback =
    document.getElementById("aufbauFeedback");

  if (
    selectedAufbauOrder.length !==
    question.answer.length
  ) {
    feedback.style.display = "block";
    feedback.style.background =
      "rgba(255,184,76,0.12)";
    feedback.style.border =
      "1px solid rgba(255,184,76,0.55)";

    feedback.innerHTML = `
      <strong style="color:#ffe0a6;">
        ⚠️ เลือกซับเชลล์ยังไม่ครบ
      </strong>

      <p style="margin-bottom:0;">
        ต้องเลือกทั้งหมด ${question.answer.length} ตำแหน่ง
      </p>
    `;

    return;
  }

  const isCorrect =
    selectedAufbauOrder.every(
      (item, index) =>
        item === question.answer[index]
    );

  aufbauAnswerLocked = true;

  if (isCorrect) {
    aufbauScore += 10;

    feedback.style.display = "block";
    feedback.style.background =
      "rgba(46,204,113,0.14)";
    feedback.style.border =
      "1px solid rgba(46,204,113,0.55)";

    feedback.innerHTML = `
      <strong style="color:#74f5a7;">
        ✅ ถูกต้อง! ได้รับ 10 คะแนน
      </strong>

      <p>
        ลำดับที่ถูกต้องคือ
        <strong>${question.answer.join(" → ")}</strong>
      </p>

      <button
        onclick="nextAufbauQuestion()"
        style="margin-top:8px;"
      >
        ${
          currentAufbauQuestionIndex ===
          selectedAufbauQuestions.length - 1
            ? "ดูผลภารกิจ"
            : "ข้อต่อไป →"
        }
      </button>
    `;
  } else {
    aufbauHearts -= 1;

    feedback.style.display = "block";
    feedback.style.background =
      "rgba(255,82,112,0.13)";
    feedback.style.border =
      "1px solid rgba(255,82,112,0.55)";

    feedback.innerHTML = `
      <strong style="color:#ff91a5;">
        ❌ ลำดับยังไม่ถูกต้อง เสียหัวใจ 1 ดวง
      </strong>

      <p>
        ลำดับที่ถูกต้องคือ
        <strong>${question.answer.join(" → ")}</strong>
      </p>

      <button
        onclick="nextAufbauQuestion()"
        style="margin-top:8px;"
      >
        ${
          aufbauHearts <= 0 ||
          currentAufbauQuestionIndex ===
          selectedAufbauQuestions.length - 1
            ? "ดูผลภารกิจ"
            : "ข้อต่อไป →"
        }
      </button>
    `;
  }
}
   function resetAufbauSelection() {

function loadCurrentOrbitalQuestion() {
  const question =
    selectedOrbitalQuestions[
      currentOrbitalQuestionIndex
    ];

  orbitalStates = {};

  question.subshells.forEach(function (subshell) {
    const boxCount =
      subshell.type === "p" ? 3 : 1;

    orbitalStates[subshell.name] =
      Array(boxCount).fill("");
  });

  orbitalAnswerLocked = false;

  showOrbitalQuestion();
}

function countPlacedOrbitalElectrons() {

  Object.values(orbitalStates)

   function validateOrbitalSubshell(
  subshell,
  states
) {
  const counts = states.map(
    getOrbitalStateElectronCount
  );

  const total =
    counts.reduce(
      (sum, value) => sum + value,
      0
    );

  if (total !== subshell.electrons) {
    return false;
  }

  if (subshell.type === "s") {
    return counts[0] === subshell.electrons;
  }

  if (subshell.type === "p") {
    const pairCount =
      counts.filter(value => value === 2).length;

    const singleCount =
      counts.filter(value => value === 1).length;

    const expectedPairs =
      Math.max(0, subshell.electrons - 3);

    const expectedSingles =
      subshell.electrons -
      expectedPairs * 2;

    return (
      pairCount === expectedPairs &&
      singleCount === expectedSingles
    );
  }

  return false;
}

  );

   function removeCationElectron(shellName) {

   function checkCationAnswer() {
  if (cationAnswerLocked) {
    return;
  }

  const question =
    selectedCationQuestions[
      currentCationQuestionIndex
    ];

  const feedback =
    document.getElementById(
      "cationFeedback"
    );

  if (
    cationRemovedElectrons !==
    question.removeCount
  ) {
    feedback.style.display = "block";
    feedback.style.background =
      "rgba(255,184,76,0.12)";
    feedback.style.border =
      "1px solid rgba(255,184,76,0.55)";

    feedback.innerHTML = `
      <strong style="color:#ffe0a6;">
        ⚠️ นำอิเล็กตรอนออกยังไม่ครบ
      </strong>

      <p style="margin-bottom:0;">
        ต้องนำออก
        ${question.removeCount} ตัว
        ขณะนี้นำออกแล้ว
        ${cationRemovedElectrons} ตัว
      </p>
    `;

    return;
  }

  const expectedShells = {
    ...question.initialShells
  };

  let remainingToRemove =
    question.removeCount;

  ["N", "M", "L", "K"].forEach(
    function (shellName) {
      if (remainingToRemove <= 0) {
        return;
      }

      const removedFromShell =
        Math.min(
          expectedShells[shellName],
          remainingToRemove
        );

      expectedShells[shellName] -=
        removedFromShell;

      remainingToRemove -=
        removedFromShell;
    }
  );

  const isCorrect =
    ["K", "L", "M", "N"].every(
      shellName =>
        cationShellValues[shellName] ===
        expectedShells[shellName]
    );

  cationAnswerLocked = true;

  if (isCorrect) {
    cationScore += 10;

    feedback.style.display = "block";
    feedback.style.background =
      "rgba(46,204,113,0.14)";
    feedback.style.border =
      "1px solid rgba(46,204,113,0.55)";

    feedback.innerHTML = `
      <strong style="color:#74f5a7;">

  } else {

    feedback.style.display = "block";

      "rgba(255,82,112,0.13)";
    feedback.style.border =
      "1px solid rgba(255,82,112,0.55)";

   function addAnionElectron() {
  if (anionAnswerLocked) {
    return;
  }

  const question =
    selectedAnionQuestions[
      currentAnionQuestionIndex
    ];

  if (
    anionAddedElectrons >=
    question.addCount
  ) {
    alert(
      "รับอิเล็กตรอนครบจำนวนที่กำหนดแล้ว"
    );

    return;
  }

  const outermostShell =
    getOutermostAnionShell();

  const shellCapacity = {
    K: 2,
    L: 8,
    M: 8,
    N: 2
  };

  if (
    anionShellValues[outermostShell] >=
    shellCapacity[outermostShell]
  ) {
    alert(
      "เชลล์นอกสุดเต็มแล้ว"
    );

    return;
  }

  anionShellValues[outermostShell] += 1;
  anionAddedElectrons += 1;

  showAnionQuestion();
}

   function checkAnionAnswer() {
  if (anionAnswerLocked) {
    return;
  }

  const question =
    selectedAnionQuestions[
      currentAnionQuestionIndex
    ];

  const feedback =
    document.getElementById(
      "anionFeedback"
    );

  if (
    anionAddedElectrons !==
    question.addCount
  ) {
    feedback.style.display = "block";
    feedback.style.background =
      "rgba(255,184,76,0.12)";
    feedback.style.border =
      "1px solid rgba(255,184,76,0.55)";

    feedback.innerHTML = `
      <strong style="color:#ffe0a6;">
        ⚠️ รับอิเล็กตรอนยังไม่ครบ
      </strong>

      <p style="margin-bottom:0;">
        ต้องรับ
        ${question.addCount} ตัว
        ขณะนี้รับแล้ว
        ${anionAddedElectrons} ตัว
      </p>
    `;

    return;
  }

  const expectedShells = {
    ...question.initialShells
  };

  const outermostShell =
    ["N", "M", "L", "K"].find(
      shellName =>
        expectedShells[shellName] > 0
    );

  expectedShells[outermostShell] +=
    question.addCount;

  const isCorrect =
    ["K", "L", "M", "N"].every(
      shellName =>
        anionShellValues[shellName] ===
        expectedShells[shellName]
    );

  anionAnswerLocked = true;

  if (isCorrect) {
    anionScore += 10;

    feedback.style.display = "block";
    feedback.style.background =
      "rgba(46,204,113,0.14)";
    feedback.style.border =
      "1px solid rgba(46,204,113,0.55)";

    feedback.innerHTML = `

  } else {

   function createAtomicRadiusVisual(element) {
  const stageSize = 230;
  const center = stageSize / 2;

  const maximumShellRadius =
    element.visualRadius;

  let shellHtml = "";
  let electronHtml = "";

  element.shells.forEach(
    function (electronCount, shellIndex) {
      const shellRadius =
        maximumShellRadius *
        ((shellIndex + 1) /
          element.shells.length);

      const shellDiameter =
        shellRadius * 2;

      shellHtml += `
        <div
          class="radius-shell"
          style="
            width:${shellDiameter}px;
            height:${shellDiameter}px;
          "
        ></div>
      `;

      for (
        let electronIndex = 0;
        electronIndex < electronCount;
        electronIndex++
      ) {
        const angle =
          -90 +
          (360 / electronCount) *
          electronIndex;

        const radians =
          angle * Math.PI / 180;

        const x =
          center +
          shellRadius *
          Math.cos(radians);

        const y =
          center +
          shellRadius *
          Math.sin(radians);

        electronHtml += `
          <div
            class="radius-electron"
            style="
              left:${x}px;
              top:${y}px;
            "
          ></div>
        `;
      }
    }
  );

  return `
    <div class="atomic-visual-card">

      <div style="
        color:#67edff;
        font-size:30px;
        font-weight:bold;
      ">
        ${element.symbol}
      </div>

      <div style="color:#dce5ff;">
        ${element.name}
      </div>

      <div style="
        margin-top:6px;
        color:#ffe0a6;
      ">
        ${element.shells.join(", ")}
      </div>

      <div class="atomic-visual-stage">

        <div
          style="
            position:absolute;
            left:50%;
            top:50%;
            width:${stageSize}px;
            height:${stageSize}px;
            transform:translate(-50%,-50%);
          "
        >
          ${shellHtml}

          <div class="radius-nucleus"></div>

          ${electronHtml}
        </div>

      </div>

      <div style="color:#aeb9da;">
        จำนวนเชลล์:
        <strong>${element.shells.length}</strong>
      </div>

    </div>
  `;
}

   function createIonizationVisual(
  element,
  isHigher
) {
  const stageSize = 230;
  const center = stageSize / 2;
  const maximumShellRadius =
    element.visualRadius;

  let shellHtml = "";
  let electronHtml = "";

  let outerElectronPosition = null;

  element.shells.forEach(
    function (electronCount, shellIndex) {
      const shellRadius =
        maximumShellRadius *
        ((shellIndex + 1) /
          element.shells.length);

      const diameter =
        shellRadius * 2;

      shellHtml += `
        <div
          class="ionization-shell"
          style="
            width:${diameter}px;
            height:${diameter}px;
          "
        ></div>
      `;

      for (
        let electronIndex = 0;
        electronIndex < electronCount;
        electronIndex++
      ) {
        const angle =
          -90 +
          (360 / electronCount) *
          electronIndex;

        const radians =
          angle * Math.PI / 180;

        const x =
          center +
          shellRadius *
          Math.cos(radians);

        const y =
          center +
          shellRadius *
          Math.sin(radians);

        const isOuterElectron =
          shellIndex ===
            element.shells.length - 1 &&
          electronIndex === 0;

        if (isOuterElectron) {
          outerElectronPosition = {
            x,
            y
          };
        }

        electronHtml += `
          <div
            class="
              ionization-electron
              ${
                isOuterElectron
                  ? "ionization-outer-electron"
                  : ""
              }
            "
            style="
              left:${x}px;
              top:${y}px;
            "
          ></div>
        `;
      }
    }
  );

  let forceLineHtml = "";

  if (outerElectronPosition) {
    const dx =
      outerElectronPosition.x - center;

    const dy =
      outerElectronPosition.y - center;

    const distance =
      Math.sqrt(dx * dx + dy * dy);

    const angle =
      Math.atan2(dy, dx) *
      180 / Math.PI;

    forceLineHtml = `
      <div
        class="
          ionization-force-line
          ${
            isHigher
              ? "ionization-force-strong"
              : "ionization-force-weak"
          }
        "
        style="
          width:${distance}px;
          transform:
            rotate(${angle}deg);
        "
      ></div>
    `;
  }

  return `
    <div class="ionization-visual-card">

      <div style="
        color:#ffbb6c;
        font-size:30px;
        font-weight:bold;
      ">
        ${element.symbol}
      </div>

      <div style="color:#dce5ff;">
        ${element.name}
      </div>

      <div style="
        margin-top:6px;
        color:#ffe0a6;
      ">
        ${element.shells.join(", ")}
      </div>

      <div class="ionization-atom-stage">

        ${shellHtml}

        ${forceLineHtml}

        <div class="ionization-nucleus"></div>

        ${electronHtml}

      </div>

      <div style="color:#aeb9da;">
        จำนวนเชลล์:
        <strong>
          ${element.shells.length}
        </strong>
      </div>

      <div
        class="ionization-energy-label"
        style="
          color:${
            isHigher
              ? "#74f5a7"
              : "#ffe0a6"
          };
          background:${
            isHigher
              ? "rgba(46,204,113,0.12)"
              : "rgba(255,184,76,0.1)"
          };
        "
      >
        ${
          isHigher
            ? "ยึดอิเล็กตรอนแน่นกว่า"
            : "นำอิเล็กตรอนออกง่ายกว่า"
        }
      </div>

    </div>
  `;
}

  selectedFinalBossQuestions = [

  ];

  currentFinalBossQuestionIndex = 0;

  finalBossScore = 0;
  finalBossHearts = 5;

finalBossMaxHP = 240;
finalBossHP = 240;

function getFinalBossPhaseName(phase) {
  if (phase === 1) {
    return "เฟส 1: โครงสร้างอะตอม";
  }

  if (phase === 2) {
    return "เฟส 2: การเกิดไอออน";
  }

  return "เฟส 3: แนวโน้มสมบัติธาตุ";
}

function displayFinalBossHearts() {
  let hearts = "";

  for (let i = 0; i < 5; i++) {
    hearts +=
      i < finalBossHearts

  }

  return hearts;
}

   function selectFinalBossAnswer(
  answer,
  button
) {
  if (finalBossAnswerLocked) {
    return;
  }

  selectedFinalBossAnswer = answer;

  document
    .querySelectorAll(
      ".boss-choice-button"
    )
    .forEach(function (choiceButton) {
      choiceButton.classList.remove(
        "selected"
      );
    });

  button.classList.add("selected");
}

function showFinalBossHint() {
  if (
    finalBossAnswerLocked ||
    finalBossHintUsed
  ) {
    return;
  }

  const question =
    selectedFinalBossQuestions[
      currentFinalBossQuestionIndex
    ];

  const feedback =
    document.getElementById(
      "finalBossFeedback"
    );

  finalBossHintUsed = true;
  finalBossHintsUsed += 1;

  feedback.style.display = "block";
  feedback.style.background =
    "rgba(255,196,66,0.13)";
  feedback.style.border =

  const hintButton =
    document.getElementById(
      "finalBossHintButton"

  if (hintButton) {
    hintButton.disabled = true;
    hintButton.textContent =

    hintButton.style.opacity = "0.65";

}
   function checkFinalBossAnswer() {
  if (finalBossAnswerLocked) {
    return;
  }

  const question =
    selectedFinalBossQuestions[
      currentFinalBossQuestionIndex
    ];

  const feedback =
    document.getElementById(
      "finalBossFeedback"
    );

  if (!selectedFinalBossAnswer) {
    feedback.style.display = "block";
    feedback.style.background =
      "rgba(255,184,76,0.13)";
    feedback.style.border =
      "1px solid rgba(255,184,76,0.55)";

    feedback.innerHTML = `
      <strong style="color:#ffe0a6;">
        ⚠️ เลือกคำตอบก่อนโจมตี Boss
      </strong>
    `;

    return;
  }

  finalBossAnswerLocked = true;

  const isCorrect =
    selectedFinalBossAnswer ===
    question.answer;

  const earnedPoints =
    finalBossHintUsed ? 5 : 10;

  if (isCorrect) {
    finalBossScore += earnedPoints;

    finalBossHP = Math.max(
      0,
      finalBossHP - earnedPoints
    );
  } else {
    finalBossHearts -= 1;
  }

  document
    .querySelectorAll(
      ".boss-choice-button"
    )
    .forEach(function (button) {
      button.disabled = true;

      const buttonAnswer =
        button.dataset.answer;

      if (
        buttonAnswer === question.answer
      ) {
        button.style.borderColor =
          "#2ecc71";

        button.style.background =
          "rgba(46,204,113,0.2)";
      } else if (
        buttonAnswer ===
        selectedFinalBossAnswer
      ) {
        button.style.borderColor =
          "#ff5270";

        button.style.background =
          "rgba(255,82,112,0.18)";
      }
    });

  feedback.style.display = "block";

  feedback.style.background =
    isCorrect
      ? "rgba(46,204,113,0.13)"
      : "rgba(255,82,112,0.13)";

  feedback.style.border =
    isCorrect
      ? "1px solid rgba(46,204,113,0.55)"
      : "1px solid rgba(255,82,112,0.55)";

  feedback.innerHTML = `
    <div style="text-align:center;">

      <strong style="
        color:${
          isCorrect
            ? "#74f5a7"
            : "#ff91a5"
        };
        font-size:20px;
      ">
        ${
          isCorrect
            ? `⚔️ โจมตีสำเร็จ! Boss เสียพลัง ${earnedPoints} HP`
            : "💥 การโจมตีพลาด! เสียหัวใจ 1 ดวง"
        }
      </strong>

      <div class="boss-attack-message">
        ${
          isCorrect
            ? `−${earnedPoints} HP ได้รับ ${earnedPoints} คะแนน`
            : `คำตอบที่ถูกต้องคือ ${question.answer}`
        }
      </div>

    </div>

    <div style="
      margin-top:15px;
      padding:14px;
      border-radius:12px;
      background:rgba(103,237,255,0.08);
    ">
      <strong style="color:#67edff;">
        อธิบาย
      </strong>

      <p style="margin-bottom:0;">
        ${question.explanation}
      </p>
    </div>

    <button
      onclick="nextFinalBossQuestion()"
      style="margin-top:16px;"
    >
      ${
  finalBossHearts <= 0
    ? "❤️ หัวใจหมด เริ่มใหม่ข้อ 1"
    : currentFinalBossQuestionIndex ===
        selectedFinalBossQuestions.length - 1
      ? "ดูผลการต่อสู้"
      : "โจมตีต่อไป →"
}
    </button>
  `;

  const checkButton =
    document.getElementById(
      "finalBossCheckButton"
    );

  const hintButton =
    document.getElementById(
      "finalBossHintButton"
    );

  if (checkButton) {
    checkButton.style.display = "none";
  }

  if (hintButton) {
    hintButton.style.display = "none";
  }
}
   function nextFinalBossQuestion() {
  /*
    ถ้าหัวใจหมดก่อนทำครบ 30 ข้อ
    ให้เริ่มการต่อสู้ใหม่ตั้งแต่ข้อ 1
  */
  if (finalBossHearts <= 0) {
    alert(
      "💔 หัวใจหมดแล้ว\n" +
      "ระบบจะเริ่มภารกิจใหม่ตั้งแต่ข้อ 1"
    );

    startFinalBoss();
    return;
  }

  /*
    แสดงผลเมื่อทำครบทุกข้อเท่านั้น
    ไม่ตรวจสอบ HP ของ Boss ในส่วนนี้
  */
  if (
    currentFinalBossQuestionIndex >=
    selectedFinalBossQuestions.length - 1
  ) {
    showFinalBossResult();
    return;
  }

  currentFinalBossQuestionIndex += 1;

  showFinalBossQuestion();
}
   function saveFinalBossStudentResult(
  resultData
) {
  const storageKey =
    "electronOrbitFinalBossScoreRecords";

  const existingRecords =
    JSON.parse(
      localStorage.getItem(storageKey)
    ) || [];

  const isDuplicate =
    existingRecords.some(
      record =>
        String(record.attemptId) ===
        String(resultData.attemptId)
    );

  if (!isDuplicate) {
    existingRecords.push(resultData);
  }

  localStorage.setItem(
    storageKey,
    JSON.stringify(existingRecords)
  );
}
  function sendFinalBossScoreToGoogleSheets(resultData) {
  const isValidApiUrl =
    typeof FINAL_BOSS_SCORE_API === "string" &&
    FINAL_BOSS_SCORE_API.startsWith(
      "https://script.google.com/macros/s/"
    ) &&
    FINAL_BOSS_SCORE_API.endsWith("/exec");

  if (!isValidApiUrl) {
    console.warn(
      "URL Google Apps Script ไม่ถูกต้อง"
    );

    savePendingFinalBossScore(resultData);
    return;
  }

  const formData = new URLSearchParams();

  formData.append(
    "token",
    FINAL_BOSS_API_TOKEN
  );

  formData.append(
    "attemptId",
    resultData.attemptId
  );

  formData.append(
    "name",
    resultData.name
  );

  formData.append(
    "className",
    resultData.className
  );
    
   formData.append(
  "room",
  resultData.room
);

  formData.append(
    "number",
    resultData.number
  );

  formData.append(
    "score",
    resultData.score
  );

  formData.append(
    "maxScore",
    resultData.maxScore
  );

  formData.append(
    "percentage",
    resultData.percentage
  );

  formData.append(
    "completedQuestions",
    resultData.completedQuestions
  );

  formData.append(
    "totalQuestions",
    resultData.totalQuestions
  );

  formData.append(
    "hintsUsed",
    resultData.hintsUsed
  );

  formData.append(
    "hintPenalty",
    resultData.hintPenalty
  );

  formData.append(
    "hearts",
    resultData.hearts
  );

  formData.append(
    "bossHP",
    resultData.bossHP
  );

  formData.append(
    "bossDefeated",
    String(resultData.bossDefeated)
  );

  formData.append(
    "title",
    resultData.title
  );

  formData.append(
    "deviceDate",
    resultData.date
  );

  formData.append(
    "userAgent",
    navigator.userAgent
  );

  fetch(FINAL_BOSS_SCORE_API, {
    method: "POST",
    mode: "no-cors",
    keepalive: true,
    body: formData
  })
    .then(function () {
      console.log(
        "ส่งผลคะแนนไป Google Sheets แล้ว"
      );
    })
    .catch(function (error) {
      console.error(
        "ส่งคะแนนไม่สำเร็จ",
        error
      );

      savePendingFinalBossScore(resultData);
    });
}
   function savePendingFinalBossScore(
  resultData
) {
  const storageKey =
    "electronOrbitPendingFinalBossScores";

  const pendingScores =
    JSON.parse(
      localStorage.getItem(storageKey)
    ) || [];

  const alreadyExists =
    pendingScores.some(
      item =>
        String(item.attemptId) ===
        String(resultData.attemptId)
    );

  if (!alreadyExists) {
    pendingScores.push(resultData);
  }

  localStorage.setItem(
    storageKey,
    JSON.stringify(pendingScores)
  );
}

function retryPendingFinalBossScores() {
  const storageKey =
    "electronOrbitPendingFinalBossScores";

  const pendingScores =
    JSON.parse(
      localStorage.getItem(storageKey)
    ) || [];

  if (pendingScores.length === 0) {
    return;
  }

  const scoresToRetry = [
    ...pendingScores
  ];

  localStorage.removeItem(storageKey);

  scoresToRetry.forEach(
    function (resultData) {
      sendFinalBossScoreToGoogleSheets(
        resultData
      );
    }
  );
}
