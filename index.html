<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Electron Orbit Quest</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background:
        radial-gradient(circle at top, #263e88, transparent 40%),
        linear-gradient(135deg, #070b24, #15134d);
    }

    .game-card {
      width: 100%;
      max-width: 680px;
      padding: 48px 28px;
      border: 1px solid rgba(94, 234, 255, 0.5);
      border-radius: 28px;
      background: rgba(10, 16, 52, 0.85);
      box-shadow: 0 0 40px rgba(76, 201, 240, 0.25);
    }

    .atom {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 24px;
    }

    .nucleus {
      position: absolute;
      top: 55px;
      left: 55px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ff4fd8;
      box-shadow: 0 0 24px #ff4fd8;
    }

    .orbit {
      position: absolute;
      inset: 20px;
      border: 2px solid #55e8ff;
      border-radius: 50%;
    }

    .orbit:nth-child(2) {
      transform: rotate(60deg);
    }

    .orbit:nth-child(3) {
      transform: rotate(120deg);
    }

    h1 {
      margin-bottom: 8px;
      font-size: clamp(32px, 7vw, 58px);
      color: #67edff;
    }

    h2 {
      margin-top: 0;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: normal;
    }

    p {
      color: #d2d8ff;
      line-height: 1.7;
    }

    button {
      margin-top: 20px;
      padding: 15px 32px;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      color: #09102c;
      background: linear-gradient(90deg, #53e8ff, #9b7cff);
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <main class="game-card">
    <div class="atom">
      <div class="nucleus"></div>
      <div class="orbit"></div>
      <div class="orbit"></div>
      <div class="orbit"></div>
    </div>

    <h1>Electron Orbit Quest</h1>

    <h2>ภารกิจพิชิตการจัดเรียงอิเล็กตรอน</h2>

    <p>
      เรียนรู้โครงสร้างอะตอม การจัดเรียงอิเล็กตรอน
      เวเลนซ์อิเล็กตรอน และการเกิดไอออน ผ่านภารกิจแสนสนุก
    </p>

    <button onclick="startGame()">เริ่มต้นภารกิจ</button>
  </main>

  <script>
    function startGame() {
      alert("ยินดีต้อนรับสู่ Electron Orbit Quest!");
    }
  </script>
</body>
</html>
