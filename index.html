<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Electron Orbit Quest</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top, #263e88, transparent 40%),
        linear-gradient(135deg, #070b24, #15134d);
    }

    .game-card {
      width: 100%;
      max-width: 620px;
      padding: 35px 28px;
      border: 1px solid rgba(94, 234, 255, 0.5);
      border-radius: 28px;
      text-align: center;
      background: rgba(10, 16, 52, 0.9);
      box-shadow: 0 0 40px rgba(76, 201, 240, 0.25);
    }

    .atom {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
    }

    .nucleus {
      position: absolute;
      top: 45px;
      left: 45px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ff4fd8;
      box-shadow: 0 0 24px #ff4fd8;
    }

    .orbit {
      position: absolute;
      inset: 14px;
      border: 2px solid #55e8ff;
      border-radius: 50%;
    }

    .orbit:nth-child(2) {
      transform: rotate(60deg);
    }

    .orbit:nth-child(3) {
      transform: rotate(120deg);
    }

    h1 {
      margin: 5px 0;
      font-size: clamp(30px, 7vw, 50px);
      color: #67edff;
    }

    h2 {
      margin: 0 0 15px;
      font-size: 22px;
      font-weight: normal;
    }

    p {
      color: #d2d8ff;
      line-height: 1.6;
    }

    .student-form {
      margin-top: 25px;
      text-align: left;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: #dce5ff;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid #4e72b8;
      border-radius: 12px;
      font-size: 16px;
      color: white;
      background: rgba(8, 15, 45, 0.9);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #58e7ff;
      box-shadow: 0 0 10px rgba(88, 231, 255, 0.4);
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 15px 28px;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      color: #09102c;
      background: linear-gradient(90deg, #53e8ff, #9b7cff);
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .error-message {
      display: none;
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      color: #ffd5df;
      background: rgba(255, 75, 120, 0.18);
      text-align: center;
    }

.shell-game {
  width: 100%;
  text-align: left;
}

.shell-topbar {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 22px;
}

.element-card {
  width: 92px;
  min-width: 92px;
  padding: 10px;
  border: 2px solid #5aa7ff;
  border-radius: 14px;
  text-align: center;
  background: linear-gradient(
    180deg,
    rgba(37, 52, 101, 0.95),
    rgba(24, 32, 69, 0.95)
  );
  box-shadow: 0 0 18px rgba(70, 154, 255, 0.45);
}

.element-number {
  color: #9ba7c9;
  font-size: 13px;
}

.element-symbol {
  margin: 4px 0;
  color: #55dfff;
  font-size: 38px;
  font-weight: bold;
}

.element-name {
  color: #dce4ff;
  font-size: 14px;
}

.shell-heading {
  flex: 1;
}

.shell-heading h2 {
  margin-bottom: 5px;
  font-size: 21px;
  line-height: 1.5;
}

.shell-heading p {
  margin: 0;
  color: #9ca8ca;
}

.atom-model {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 20px auto;
}

.atom-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1.5px solid rgba(74, 139, 231, 0.65);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.ring-k {
  width: 82px;
  height: 82px;
}

.ring-l {
  width: 140px;
  height: 140px;
}

.ring-m {
  width: 200px;
  height: 200px;
}

.ring-n {
  width: 260px;
  height: 260px;
}

.atom-nucleus {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ffd15c, #ff9d00);
  box-shadow: 0 0 20px rgba(255, 169, 23, 0.65);
  transform: translate(-50%, -50%);
}

.electron-dot {
  position: absolute;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #49cfff;
  box-shadow: 0 0 10px rgba(73, 207, 255, 0.8);
  transform: translate(-50%, -50%);
  transition: 0.25s ease;
}

.shell-controls-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 9px;
  margin-top: 10px;
}

.shell-box {
  padding: 12px 7px;
  border: 1px solid rgba(92, 124, 194, 0.38);
  border-radius: 13px;
  text-align: center;
  background: rgba(29, 40, 83, 0.88);
}

.shell-name {
  color: #55dfff;
  font-weight: bold;
}

.shell-count {
  margin: 9px 0;
  font-size: 25px;
  font-weight: bold;
}

.shell-buttons {
  display: flex;
  justify-content: center;
  gap: 7px;
}

.shell-mini-button {
  width: 32px;
  height: 32px;
  margin: 0;
  padding: 0;
  border: 1px solid #435a9a;
  border-radius: 7px;
  color: white;
  font-size: 20px;
  background: #111a3b;
}

.shell-action-grid {
  display: grid;
  grid-template-columns: 1fr 1.35fr;
  gap: 10px;
  margin-top: 22px;
}

.shell-action-grid button {
  margin: 0;
  border-radius: 11px;
}

.hint-button {
  border: 1px solid #f2c652;
  color: #ffe27e;
  background: rgba(83, 61, 14, 0.45);
}

.check-button {
  color: white;
  background: linear-gradient(90deg, #20c66c, #35dd79);
}

.shell-secondary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.shell-secondary-grid button {
  margin: 0;
  border: 1px solid #455588;
  border-radius: 11px;
  color: #dce5ff;
  background: rgba(12, 20, 52, 0.9);
}

@media (max-width: 520px) {
  .game-card {
    padding: 24px 14px;
  }

  .shell-topbar {
    align-items: flex-start;
  }

  .element-card {
    width: 82px;
    min-width: 82px;
  }

 .atom-model {
  width: 300px;
  height: 300px;
  max-width: 100%;
}

  .shell-controls-grid {
    gap: 6px;
  }

  .shell-box {
    padding: 10px 4px;
  }

  .shell-action-grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>
  <main class="game-card">
    <div class="atom">
      <div class="nucleus"></div>
      <div class="orbit"></div>
      <div class="orbit"></div>
      <div class="orbit"></div>
    </div>

    <h1>Electron Orbit Quest</h1>
    <h2>ภารกิจพิชิตการจัดเรียงอิเล็กตรอน</h2>

    <p>
      ลงทะเบียนผู้เล่นก่อนเริ่มต้นภารกิจ
      และเตรียมตัวออกเดินทางสู่โลกของอะตอม
    </p>

    <form class="student-form" id="studentForm">
      <label for="studentName">ชื่อ–นามสกุล</label>
      <input
        type="text"
        id="studentName"
        placeholder="เช่น เด็กหญิงอะตอม สดใส"
      >

      <label for="studentClass">ชั้นเรียน</label>
      <select id="studentClass">
        <option value="">-- เลือกชั้นเรียน --</option>
        <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
        <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
        <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
        <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
        <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
        <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
      </select>

      <label for="studentNumber">เลขที่</label>
      <input
        type="number"
        id="studentNumber"
        min="1"
        max="60"
        placeholder="เช่น 15"
      >

      <div class="error-message" id="errorMessage">
        กรุณากรอกข้อมูลให้ครบทุกช่อง
      </div>

      <button type="submit">🚀 เริ่มต้นภารกิจ</button>
    </form>
  </main>

 <script>
  const studentForm = document.getElementById("studentForm");
  const errorMessage = document.getElementById("errorMessage");

  studentForm.addEventListener("submit", function (event) {
    event.preventDefault();

    const studentName =
      document.getElementById("studentName").value.trim();

    const studentClass =
      document.getElementById("studentClass").value;

    const studentNumber =
      document.getElementById("studentNumber").value;

    if (!studentName || !studentClass || !studentNumber) {
      errorMessage.style.display = "block";
      return;
    }

    errorMessage.style.display = "none";

    const studentData = {
      name: studentName,
      className: studentClass,
      number: studentNumber
    };

    localStorage.setItem(
      "electronOrbitStudent",
      JSON.stringify(studentData)
    );

    showLevelMap(studentData);
  });

  function showLevelMap(studentData) {

            </span>
          </button>

          <button
  onclick="showLevelTwoLessonFromMap()"

    margin:0;

    border-radius:18px;

    gap:8px;
    background:linear-gradient(135deg,#7b5cff,#3ed7ff);
  "
>
  <span style="font-size:34px;">🪐</span>

  <strong>ด่านที่ 2</strong>

  <span style="font-size:14px;">
    การจัดเรียงอิเล็กตรอนแบบเชลล์

</button>

         <button
  onclick="showLevelThreeLessonFromMap()"

    margin:0;

    background:linear-gradient(135deg,#ff65c3,#8f6cff);
  "
>

  <span style="font-size:14px;">
    เวเลนซ์อิเล็กตรอน
  </span>
</button>

          ${createLockedLevel(
            4,

          )}

          )}

          ${createLockedLevel(
            6,
            "แคตไอออน"
          )}

          ${createLockedLevel(
            7,
            "แอนไอออน"
          )}

          ${createLockedLevel(
            8,
            "แนวโน้มขนาดอะตอม"
          )}

          ${createLockedLevel(
            9,
            "ขนาดไอออน"
          )}

          )}

        </div>

        <div style="
          margin-top:18px;
          padding:20px;
          border:1px solid rgba(255,184,76,0.6);
          border-radius:18px;
          background:rgba(255,184,76,0.08);
        ">
          <div style="font-size:32px;">👑</div>

          <h3 style="
            margin:8px 0;

          </h3>

          <p style="
            margin:0;
            color:#d2d8ff;
            font-size:14px;
          ">
            ปลดล็อกเมื่อผ่านทุกด่าน
          </p>
        </div>

        <button
          onclick="location.reload()"
          style="
            margin-top:18px;
            background:transparent;
            border:1px solid #67edff;
            color:#67edff;
          "
        >
          ← กลับหน้าลงทะเบียน
        </button>

      </div>
    `;
  }
function createLockedLevel(levelNumber, levelTitle) {
  return `
    <button
      type="button"
      onclick="showLockedMessage(${levelNumber})"
      style="
        margin:0;
        min-height:125px;
        padding:15px;
        border:1px solid rgba(126,143,190,0.45);
        border-radius:18px;
        color:#8793bb;
        background:rgba(23,30,70,0.75);
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        gap:8px;
        cursor:pointer;
      "
    >
      <span style="font-size:30px;">🔒</span>

      <strong>
        ด่านที่ ${levelNumber}
      </strong>

      <span style="
        font-size:13px;
        line-height:1.4;
      ">
        ${levelTitle}
      </span>
    </button>
  `;
}
  function showLesson(studentData) {
    document.querySelector(".game-card").innerHTML = `
      <div class="lesson-page">

        <p style="color:#67edff; font-weight:bold;">
          ผู้เล่น: ${studentData.name}
          | ชั้น ${studentData.className}
          | เลขที่ ${studentData.number}
        </p>

        </h1>

          ด่านที่ 1: เลขอะตอมและจำนวนอิเล็กตรอน
        </h2>

          background:rgba(8,15,45,0.75);

          </h3>

          </p>

          </div>

          <h3 style="color:#67edff;">
            ตัวอย่าง
          </h3>

          <p>
            ธาตุโซเดียมมีเลขอะตอม 11 จึงมีโปรตอน 11 ตัว
            และเมื่อเป็นอะตอมที่เป็นกลางจะมีอิเล็กตรอน 11 ตัว
          </p>

        </div>

              <button onclick="startQuiz()">
        ⚡ เริ่มทำภารกิจด่านที่ 1
      </button>

      <button
        onclick="backToLevelMap()"
        style="
          margin-top:12px;
          background:transparent;
          border:1px solid #67edff;
          color:#67edff;
        "
      >
        ← กลับหน้าเลือกด่าน
      </button>

    </div>
  `;
}

function backToLevelMap() {
  const studentData = JSON.parse(
    localStorage.getItem("electronOrbitStudent")
  );

  if (!studentData) {
    location.reload();
    return;
  }

  showLevelMap(studentData);
}

   function shuffleQuestions(questions) {
  for (let i = questions.length - 1; i > 0; i--) {
    const randomIndex = Math.floor(Math.random() * (i + 1));

    [questions[i], questions[randomIndex]] = [
      questions[randomIndex],
      questions[i]
    ];
  }

  return questions;
}

  buttons.forEach(function (button) {

function displayValenceHearts() {
  let heartDisplay = "";

  for (let i = 0; i < 3; i++) {
    heartDisplay +=
      i < valenceHearts ? "❤️" : "🖤";
  }

  return heartDisplay;
}

function checkValenceAnswer(
  selectedAnswer,
  selectedButton
) {
  if (valenceAnswerLocked) {
    return;
  }

  valenceAnswerLocked = true;

  const question =
    selectedValenceQuestions[
      currentValenceQuestionIndex
    ];

  const buttons =
    document.querySelectorAll(
      ".valence-choice"
    );

  const feedbackBox =
    document.getElementById(
      "valenceFeedback"
    );

  const nextButton =
    document.getElementById(
      "nextValenceButton"
    );

  buttons.forEach(function (button) {
    button.disabled = true;
    button.style.cursor = "not-allowed";
    button.style.opacity = "0.75";
  });

  const correctButton =
    [...buttons].find(
      button =>
        Number(button.textContent.trim()) ===
        question.answer
    );

  if (correctButton) {
    correctButton.style.background =
      "rgba(46,204,113,0.28)";
    correctButton.style.borderColor =
      "#2ecc71";
  }

  if (selectedAnswer === question.answer) {
    valenceScore += 10;

    selectedButton.style.background =
      "rgba(46,204,113,0.28)";
    selectedButton.style.borderColor =
      "#2ecc71";

    feedbackBox.style.background =
      "rgba(46,204,113,0.14)";
    feedbackBox.style.border =
      "1px solid rgba(46,204,113,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#74f5a7;">
        ✅ ถูกต้อง! ได้รับ 10 คะแนน
      </strong>

      <p style="margin-bottom:0;">
        การจัดเรียงแบบเชลล์ของ
        ${question.element}
        คือ
        <strong>${question.shellText}</strong>
        เชลล์นอกสุดคือ
        <strong>${question.outerShell}</strong>
        และมีอิเล็กตรอน
        <strong>${question.answer} ตัว</strong>
      </p>
    `;
  } else {
    valenceHearts -= 1;

    selectedButton.style.background =
      "rgba(255,82,112,0.25)";
    selectedButton.style.borderColor =
      "#ff5270";

    feedbackBox.style.background =
      "rgba(255,82,112,0.13)";
    feedbackBox.style.border =
      "1px solid rgba(255,82,112,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#ff91a5;">
        ❌ ยังไม่ถูกต้อง เสียหัวใจ 1 ดวง
      </strong>

      <p style="margin-bottom:0;">
        ดูตัวเลขตำแหน่งสุดท้ายของ
        <strong>${question.shellText}</strong>
        จึงได้เวเลนซ์อิเล็กตรอน
        <strong>${question.answer} ตัว</strong>
      </p>
    `;
  }

  feedbackBox.style.display = "block";

  if (
    valenceHearts <= 0 ||
    currentValenceQuestionIndex ===
      selectedValenceQuestions.length - 1
  ) {
    nextButton.textContent =
      "ดูผลภารกิจ";
  } else {
    nextButton.textContent =
      "ข้อต่อไป →";
  }

  nextButton.style.display = "block";
}

function nextValenceQuestion() {
  if (
    valenceHearts <= 0 ||
    currentValenceQuestionIndex >=
      selectedValenceQuestions.length - 1

    showLevelThreeResult();
    return;

  currentValenceQuestionIndex += 1;

  showValenceQuestion();
}

   function createElectronDots(
  shellName,
  electronCount,
  radius
) {
  if (electronCount <= 0) {
    return "";
  }

  let dots = "";

  for (let i = 0; i < electronCount; i++) {
    const angle =
      -90 + (360 / electronCount) * i;

    const angleInRadians =
      angle * (Math.PI / 180);

    const center = 150;

    const x =
      center +
      radius * Math.cos(angleInRadians);

    const y =
      center +
      radius * Math.sin(angleInRadians);

    dots += `
      <div
        class="electron-dot"
        title="อิเล็กตรอนในเชลล์ ${shellName}"
        style="
          left:${x}px;
          top:${y}px;
        "
      ></div>
    `;
  }

  return dots;
}

        ${createModernShellControl("K", 2)}
        ${createModernShellControl("L", 8)}
        ${createModernShellControl("M", 8)}
        ${createModernShellControl("N", 2)}

      </div>

      <div
        id="shellFeedback"
        style="
          display:none;
          margin-top:18px;
          padding:16px;
          border-radius:14px;
          line-height:1.6;
        "
      ></div>

      <div class="shell-action-grid">

        <button
          class="hint-button"
          onclick="showShellHint()"
        >
          💡 คำใบ้
        </button>

        <button
          class="check-button"
          onclick="checkShellAnswer()"
        >
          ✅ ตรวจคำตอบ
        </button>

      </div>

      <div class="shell-secondary-grid">

        <button onclick="showLevelTwoLessonFromMap()">
          📖 ดูบทเรียน
        </button>

        <button onclick="resetShellBuilder()">
          🔄 เริ่มต้นใหม่
        </button>

      </div>

      <button
        onclick="backToLevelMap()"
        style="
          margin-top:12px;
          border:1px solid #67edff;
          color:#67edff;
          background:transparent;
        "
      >
        ← กลับหน้าเลือกด่าน
      </button>

    </div>
  `;
}
   function changeModernShellValue(
  shellName,
  amount,
  maximum
) {
  if (shellAnswerLocked) {
    return;
  }

  const currentTotal =
    shellValues.K +
    shellValues.L +
    shellValues.M +
    shellValues.N;
  if (
    amount > 0 &&
    currentTotal >= shellQuestion.atomicNumber
  ) {
    alert(
      "จัดอิเล็กตรอนครบ " +
      shellQuestion.atomicNumber +
      " ตัวแล้ว"
    );

    return;
  }

  const newValue =
    shellValues[shellName] + amount;

  if (newValue < 0 || newValue > maximum) {
    return;
  }

  shellValues[shellName] = newValue;

  showShellBuilder();
}
   function showShellHint() {
  const feedbackBox =
    document.getElementById("shellFeedback");

  feedbackBox.style.display = "block";
  feedbackBox.style.background =
    "rgba(255,196,66,0.12)";
  feedbackBox.style.border =
    "1px solid rgba(255,196,66,0.55)";

  feedbackBox.innerHTML = `
    <strong style="color:#ffe27e;">
      💡 คำใบ้
    </strong>

    <p style="margin-bottom:0;">
      เติมอิเล็กตรอนในเชลล์ด้านในก่อน
      โดยเชลล์ K บรรจุได้สูงสุด 2 ตัว
      จากนั้นจึงเติมเชลล์ L
    </p>
  `;
}
   function getShellAnswerText(answer) {
  const values = [
    answer.K,
    answer.L,
    answer.M,
    answer.N
  ];

  while (
    values.length > 1 &&
    values[values.length - 1] === 0
  ) {
    values.pop();
  }

  return values.join(", ");
}
   function checkShellAnswer() {
  if (shellAnswerLocked) {
    return;
  }

  const feedbackBox =
    document.getElementById("shellFeedback");

  const totalElectrons =
    shellValues.K +
    shellValues.L +
    shellValues.M +
    shellValues.N;

  if (totalElectrons !== shellQuestion.atomicNumber) {
    feedbackBox.style.display = "block";
    feedbackBox.style.background =
      "rgba(255,184,76,0.12)";
    feedbackBox.style.border =
      "1px solid rgba(255,184,76,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#ffe0a6;">
        ⚠️ จำนวนอิเล็กตรอนยังไม่ครบ
      </strong>

      <p style="margin-bottom:0;">
        ต้องจัดให้ครบ
        ${shellQuestion.atomicNumber} ตัว
        ขณะนี้จัดแล้ว ${totalElectrons} ตัว
      </p>
    `;

    return;
  }

  const isCorrect =
    shellValues.K === shellQuestion.correctAnswer.K &&
    shellValues.L === shellQuestion.correctAnswer.L &&
    shellValues.M === shellQuestion.correctAnswer.M &&
    shellValues.N === shellQuestion.correctAnswer.N;

  feedbackBox.style.display = "block";

  if (isCorrect) {
    shellAnswerLocked = true;
    shellScore += 10;

    const answerText =
      getShellAnswerText(
        shellQuestion.correctAnswer
      );

    const isLastQuestion =
      currentShellQuestionIndex ===
      selectedShellQuestions.length - 1;

    feedbackBox.style.background =
      "rgba(46,204,113,0.14)";
    feedbackBox.style.border =
      "1px solid rgba(46,204,113,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#74f5a7;">
        ✅ ถูกต้อง! ได้รับ 10 คะแนน
      </strong>

      <p>
        ${shellQuestion.element}
        มีอิเล็กตรอน
        ${shellQuestion.atomicNumber} ตัว
        จัดเรียงแบบเชลล์เป็น
        <strong>${answerText}</strong>
      </p>

      <button
        onclick="nextShellQuestion()"
        style="
          margin-top:8px;
          color:#09102c;
          background:linear-gradient(
            90deg,
            #53e8ff,
            #9b7cff
          );
        "
      >
        ${
          isLastQuestion
            ? "ดูสรุปผลภารกิจ"
            : "ธาตุถัดไป →"
        }
      </button>
    `;
  } else {
    feedbackBox.style.background =
      "rgba(255,82,112,0.13)";
    feedbackBox.style.border =
      "1px solid rgba(255,82,112,0.55)";

    feedbackBox.innerHTML = `
      <strong style="color:#ff91a5;">
        ❌ การจัดเรียงยังไม่ถูกต้อง
      </strong>

      <p style="margin-bottom:0;">
        เติมอิเล็กตรอนในเชลล์ด้านในก่อน
        เริ่มจาก K แล้วจึงไป L, M และ N
        ลองปรับคำตอบอีกครั้ง
      </p>
    `;
  }
}
   function nextShellQuestion() {
  if (
    currentShellQuestionIndex >=
    selectedShellQuestions.length - 1
  ) {
    showLevelTwoResult();
    return;
  }

  currentShellQuestionIndex += 1;

  loadCurrentShellQuestion();
}
   function showLevelTwoResult() {
  const studentData = JSON.parse(
    localStorage.getItem("electronOrbitStudent")
  );

  const maxScore =
    selectedShellQuestions.length * 10;

  const percentage = Math.round(
    (shellScore / maxScore) * 100
  );

  let resultLevel = "";
  let resultStars = "";
  let resultMessage = "";

  if (percentage >= 90) {
    resultLevel = "Electron Master";
    resultStars = "⭐⭐⭐";
    resultMessage =
      "ยอดเยี่ยมมาก! คุณจัดเรียงอิเล็กตรอนแบบเชลล์ได้อย่างแม่นยำ";
  } else if (percentage >= 75) {
    resultLevel = "Atomic Explorer";
    resultStars = "⭐⭐";
    resultMessage =
      "ทำได้ดีมาก คุณเข้าใจการเติมอิเล็กตรอนในแต่ละเชลล์แล้ว";
  } else if (percentage >= 60) {
    resultLevel = "Orbit Trainee";
    resultStars = "⭐";
    resultMessage =
      "ผ่านภารกิจแล้ว ควรฝึกจัดเรียงธาตุเพิ่มเติม";
  } else {
    resultLevel = "Try Again Hero";
    resultStars = "🔄";
    resultMessage =
      "ลองทบทวนบทเรียนแล้วกลับมาทำภารกิจอีกครั้ง";
  }

  const levelTwoResult = {
    name: studentData.name,
    className: studentData.className,
    number: studentData.number,
    levelNumber: 2,
    score: shellScore,
    maxScore: maxScore,
    percentage: percentage,
    level: resultLevel,
    date: new Date().toLocaleString("th-TH")
  };

  localStorage.setItem(
    "electronOrbitLevelTwoResult",
    JSON.stringify(levelTwoResult)
  );

  document.querySelector(".game-card").innerHTML = `
    <div class="result-page">

      <div style="
        font-size:58px;
        margin-bottom:10px;
      ">
        ${resultStars}
      </div>

      <h1>
        สรุปผลด่านที่ 2
      </h1>

      <h2 style="color:#c9b8ff;">
        ${resultLevel}
      </h2>

      <p>
        ${resultMessage}
      </p>

      <div style="
        margin:25px 0;
        padding:24px;
        border:1px solid #4e72b8;
        border-radius:18px;
        background:rgba(8,15,45,0.75);
        text-align:left;
      ">
        <p>
          <strong>ผู้เล่น:</strong>
          ${studentData.name}
        </p>

        <p>
          <strong>ชั้น:</strong>
          ${studentData.className}
        </p>

        <p>
          <strong>เลขที่:</strong>
          ${studentData.number}
        </p>

        <p>
          <strong>คะแนน:</strong>
          ${shellScore} / ${maxScore}
        </p>

        <p>
          <strong>คิดเป็น:</strong>
          ${percentage}%
        </p>

        <p>
          <strong>จำนวนธาตุ:</strong>
          ${selectedShellQuestions.length} ธาตุ
        </p>
      </div>

      <button onclick="startLevelTwoQuiz()">
        🔄 เล่นด่านที่ 2 อีกครั้ง
      </button>

      <button
        onclick="showLevelTwoLessonFromMap()"
        style="
          margin-top:12px;
          color:#dce5ff;
          background:rgba(12,20,52,0.9);
          border:1px solid #455588;
        "
      >
        📖 ทบทวนบทเรียน
      </button>

      <button
        onclick="backToLevelMap()"
        style="
          margin-top:12px;
          color:#67edff;
          background:transparent;
          border:1px solid #67edff;
        "
      >
        🗺️ กลับหน้าเลือกด่าน
      </button>

    </div>
  `;
}
  
</script>
